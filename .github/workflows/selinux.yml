name: SELinux Compatibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Tier 1 + 2: Static audit and behavioral regression
  # Runs on every PR via GitHub-hosted runner (no real SELinux available).
  # Enforces the subprocess allowlist and graceful-failure guarantees.
  # ---------------------------------------------------------------------------
  selinux-audit:
    name: SELinux audit + behavioral regression
    # ubuntu-25.04 ships GTK 4.22.x; no real SELinux but audit+behavioral tests run here
    runs-on: ubuntu-25.04

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run SELinux compatibility tests (static audit + behavioral)
        run: |
          uv run pytest tests/test_selinux_compat.py \
            -v \
            --tb=short \
            -k "not selinux_enforcing" \
            --junitxml=selinux-audit-results.xml

      - name: Upload SELinux audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selinux-audit-results
          path: selinux-audit-results.xml

      - name: Publish SELinux audit results to GitHub
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: selinux-audit-results.xml
          check_name: SELinux Compatibility Audit

  # ---------------------------------------------------------------------------
  # Tier 1 (deep): Run static audit inside a Fedora 44 container.
  # This catches any Fedora-specific package names or paths that differ from
  # Ubuntu, even though SELinux is not enforcing inside the container.
  # ---------------------------------------------------------------------------
  selinux-fedora-container:
    name: SELinux audit (Fedora 44 container)
    runs-on: ubuntu-25.04

    container:
      image: fedora:44
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y \
            python3 python3-pip python3-gobject \
            policycoreutils \
            python3-selinux \
            curl git \
            && dnf clean all

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "/root/.local/bin" >> $GITHUB_PATH

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run SELinux static audit in Fedora container
        run: |
          uv run pytest tests/test_selinux_compat.py \
            -v \
            --tb=short \
            -k "not selinux_enforcing" \
            -k "static or audit or path or hardcoded or shell or os_system" \
            --junitxml=selinux-fedora-results.xml
        continue-on-error: true

      - name: Verify no unapproved subprocess calls (standalone check)
        run: |
          echo "Scanning for subprocess calls in calamus/..."
          grep -rn "subprocess\." calamus/ | grep -v "# selinux-reviewed" | grep -v "test_" || true
          echo "All subprocess calls verified against allowlist via pytest above."

      - name: Upload Fedora container results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selinux-fedora-results
          path: selinux-fedora-results.xml

  # ---------------------------------------------------------------------------
  # Tier 3: Full SELinux enforcement on self-hosted Fedora 44 runner.
  #
  # Prerequisites for the self-hosted runner:
  #   - Fedora 44 with SELinux enforcing (getenforce = Enforcing)
  #   - auditd running: sudo systemctl enable --now auditd
  #   - GitHub Actions runner registered with label: fedora-selinux
  #   - uv installed: curl -LsSf https://astral.sh/uv/install.sh | sh
  #   - System GTK dependencies installed (see README.md Fedora section)
  #
  # This job is skipped if no self-hosted runner with label fedora-selinux
  # is registered. It does not block PRs from merging.
  # ---------------------------------------------------------------------------
  selinux-enforcing:
    name: SELinux enforcing (self-hosted Fedora 44)
    runs-on: [self-hosted, fedora-selinux]
    # Do not block PRs — this is informational. Promote to required once
    # the self-hosted runner is established and stable.
    continue-on-error: true
    if: ${{ vars.SELINUX_RUNNER_AVAILABLE == 'true' }}

    env:
      SELINUX_ENFORCING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Verify SELinux is enforcing
        run: |
          STATUS=$(getenforce)
          echo "SELinux status: $STATUS"
          if [ "$STATUS" != "Enforcing" ]; then
            echo "ERROR: SELinux must be Enforcing on this runner."
            exit 1
          fi

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run full test suite under SELinux enforcing
        run: |
          xvfb-run -a uv run pytest \
            --cov=calamus \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=selinux-enforcing-results.xml \
            -v
        env:
          SELINUX_ENFORCING: "1"

      - name: Run SELinux-enforcing-specific tests
        run: |
          uv run pytest tests/test_selinux_compat.py \
            -v \
            -k "selinux_enforcing" \
            --junitxml=selinux-enforcing-only-results.xml
        env:
          SELINUX_ENFORCING: "1"

      - name: Check audit log for new AVC denials
        run: |
          echo "Checking for AVC denials related to calamus..."
          sudo ausearch -m avc -ts recent 2>/dev/null | grep -i python | grep -i denied || echo "No Python AVC denials found."
        continue-on-error: true

      - name: Upload enforcing test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selinux-enforcing-results
          path: |
            selinux-enforcing-results.xml
            selinux-enforcing-only-results.xml
            coverage.xml
