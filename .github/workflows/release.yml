name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Create release
    # ubuntu-24.04; GTK >= 4.22.4 required
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-gtk4-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: apt-${{ runner.os }}-gtk4-
      - name: Install system GTK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-4.0 gir1.2-adw-1 \
            gir1.2-gtksource-5 \
            libgtk-4-1 libadwaita-1-0 \
            xvfb dbus \
            libcairo2-dev libgirepository1.0-dev pkg-config python3-dev
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: xvfb-run -a uv run pytest
      - name: Build package
        run: uv build
      - name: Extract release notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract section for this version from CHANGELOG.md
          awk "/^## \[$VERSION\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > release_body.txt
          cat release_body.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.txt
          files: dist/*
          fail_on_unmatched_files: true
      - name: Publish to PyPI
        if: vars.PUBLISH_TO_PYPI == 'true'
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
