# TODO: Replace app-id with a proper reverse-DNS domain before Flathub submission
#       (e.g. org.yourdomain.calamus). Current ID uses GitHub username as placeholder.
app-id: io.github.mray271.calamus

runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk

command: calamus

finish-args:
  # Display: prefer Wayland, fall back to X11
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # File access: users need to open/save files anywhere in their home dir
  - --filesystem=home
  # Printing support
  - --socket=cups

modules:
  # -------------------------------------------------------------------------
  # Python dependencies not bundled in the GNOME 48 runtime.
  #
  # NOTE for Flathub submission: replace the pip install below with offline
  # source entries generated by flatpak-pip-generator:
  #   https://github.com/flatpak/flatpak-pip-generator
  #
  #   flatpak-pip-generator mistune odfpy weasyprint
  #
  # This produces a python3-*.json sources file you can include here instead.
  # -------------------------------------------------------------------------
  - name: python-dependencies
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation
            mistune
            odfpy
            weasyprint
    sources:
      - type: shell
        commands:
          - echo "Network install - replace with offline sources for Flathub"

  # -------------------------------------------------------------------------
  # Calamus itself
  # -------------------------------------------------------------------------
  - name: calamus
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation --no-deps .
      # Desktop integration
      - install -Dm644 resources/desktop/calamus.desktop
            /app/share/applications/io.github.mray271.calamus.desktop
      - install -Dm644 resources/desktop/calamus.svg
            /app/share/icons/hicolor/scalable/apps/io.github.mray271.calamus.svg
      - install -Dm644 resources/desktop/calamus_48x48.png
            /app/share/icons/hicolor/48x48/apps/io.github.mray271.calamus.png
      - install -Dm644 resources/desktop/calamus_128x128.png
            /app/share/icons/hicolor/128x128/apps/io.github.mray271.calamus.png
      - install -Dm644 resources/desktop/calamus_256x256.png
            /app/share/icons/hicolor/256x256/apps/io.github.mray271.calamus.png
      # Man page
      - install -Dm644 docs/calamus.1
            /app/share/man/man1/calamus.1
    sources:
      - type: dir
        path: ../..
