services:
  app:
    build: .
    container_name: calamus-app
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - WEBKIT_DISABLE_SANDBOX=1
      - WEBKIT_FORCE_SANDBOX=0
      - XAUTHORITY=/root/.Xauthority
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-}
      - XDG_RUNTIME_DIR=/tmp
      - DBUS_SESSION_BUS_ADDRESS=${DBUS_SESSION_BUS_ADDRESS:-}
    volumes:
      - .:/app
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XAUTHORITY:-~/.Xauthority}:/root/.Xauthority:ro
      - ${XDG_RUNTIME_DIR:-/tmp}/${WAYLAND_DISPLAY:-wayland-0}:/tmp/${WAYLAND_DISPLAY:-wayland-0}:rw
      - ~/.config/Calamus:/root/.config/Calamus
    security_opt:
      # label=disable is required on Fedora/SELinux so the container can access
      # the X11 socket.  Authentication is handled via ~/.Xauthority (MIT-MAGIC-COOKIE)
      # so no `xhost` changes are needed on the host.
      - label=disable
      - seccomp=unconfined
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    network_mode: host
    command: ["dbus-run-session", "uv", "run", "calamus"]

  test:
    build: .
    container_name: calamus-test
    environment:
      - DISPLAY=:99
    volumes:
      - .:/app
    command: >
      sh -c "rm -f /tmp/.X99-lock &&
             Xvfb :99 -screen 0 1024x768x24 &
             sleep 1 &&
             uv run pytest"

  format-check:
    build: .
    container_name: calamus-format
    volumes:
      - .:/app
    command: uv run black --check .
